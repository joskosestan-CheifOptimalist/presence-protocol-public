name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  docs-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List public docs
        run: |
          echo "Public repo docs sanity check"
          test -f README.md
          test -d docs
          find docs -maxdepth 2 -type f | sort

      - name: Confirm sanitized repo shape
        run: |
          if [ -d mobile ]; then
            echo "Unexpected mobile directory present in public repo"
            exit 1
          fi
          echo "Sanitized public repo confirmed"
